<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Good Earth News</title>
    <meta name="description" content="An interactive 3D globe showing only positive, AI-verified environmental news — each story pinned to where in the world it happened." />
    <meta name="theme-color" content="#0c182c" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph — controls how the link unfurls on LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Good Earth News" />
    <meta property="og:url" content="https://goodearthnews.org/" />
    <meta property="og:title" content="Good Earth News — a 3D globe of AI-verified good news" />
    <meta property="og:description" content="Fly around a low-poly Earth and explore only positive environmental news — recoveries, clean-energy wins, rewilding — each story verified by an AI pipeline and pinned to where it happened." />
    <meta property="og:image" content="https://goodearthnews.org/og-logo.png" />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1350" />
    <meta property="og:image:alt" content="Good Earth News logo — a stylized green-and-blue planet with a sprout." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a1628; overflow: hidden; font-family: 'Nunito', sans-serif; overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
