# Render.com Blueprint — one always-on Node service that serves the globe (built
# frontend) AND the API, with a persistent disk for the SQLite article library.
#
# Deploy: push this repo to GitHub, then in Render → New → Blueprint, pick the
# repo. After it creates the service, set ANTHROPIC_API_KEY in the dashboard
# (it's marked sync:false so it isn't stored in the repo).
services:
  - type: web
    name: good-earth-news
    runtime: node
    plan: starter            # paid tier — required for the persistent disk below
    region: oregon
    buildCommand: npm install && npm install --prefix backend && npm install --include=dev --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this in the Render dashboard (secret)
      - key: ADMIN_TOKEN
        generateValue: true  # protects POST /api/fetch; value visible in dashboard
      - key: DATA_DIR
        value: /var/data     # matches the disk mount below
      - key: NODE_VERSION
        value: "20"
    disk:
      name: data
      mountPath: /var/data   # SQLite library + ratings persist here
      sizeGB: 1
